<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>GRAVITY PANEL</title>
  <!-- Font & base -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #1a103c, #03010a);
      background-attachment: fixed;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
      color: #e9e1ff;
    }

    /* ===== BACKGROUND ANIMATION >>>><<< ===== */
    .gravity-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .gravity-wave {
      position: absolute;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(45deg, 
        rgba(120, 60, 255, 0.03) 0px, 
        rgba(0, 255, 255, 0.05) 20px,
        rgba(180, 80, 255, 0.02) 40px);
      animation: gravityDrift 28s infinite alternate cubic-bezier(0.45, 0.05, 0.2, 0.99);
      transform: rotate(5deg);
    }

    .gravity-wave:nth-child(2) {
      opacity: 0.5;
      animation: gravityDriftReverse 34s infinite alternate;
      background: repeating-radial-gradient(circle at 20% 30%, rgba(80, 200, 255, 0.05) 0%, transparent 25%);
    }

    @keyframes gravityDrift {
      0% { transform: translate(-5%, -5%) rotate(3deg); }
      100% { transform: translate(-15%, -10%) rotate(12deg); }
    }
    @keyframes gravityDriftReverse {
      0% { transform: translate(0%, 0%) rotate(-5deg); }
      100% { transform: translate(-8%, -6%) rotate(-15deg); }
    }

    .scrolling-arrows {
      position: fixed;
      bottom: 20px;
      left: 0;
      width: 100%;
      white-space: nowrap;
      font-size: 2.2rem;
      font-weight: 700;
      color: rgba(170, 120, 255, 0.25);
      z-index: 0;
      pointer-events: none;
      letter-spacing: 20px;
      animation: scrollArrows 18s linear infinite;
      text-shadow: 0 0 20px #a78bfa;
    }

    @keyframes scrollArrows {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .gravity-panel {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 560px;
      background: rgba(12, 8, 28, 0.65);
      backdrop-filter: blur(16px) saturate(200%);
      -webkit-backdrop-filter: blur(16px) saturate(200%);
      border: 1.8px solid;
      border-image: linear-gradient(145deg, #a855f7, #06b6d4, #8b5cf6) 1;
      border-radius: 48px;
      box-shadow: 0 30px 50px -10px #00000080, 0 0 0 1px rgba(168, 85, 247, 0.2) inset, 0 0 40px #4f2ee850;
      padding: 2rem 1.8rem 2.2rem;
      transition: box-shadow 0.3s;
      animation: floatGlow 6s infinite alternate ease-in-out;
    }

    @keyframes floatGlow {
      0% { box-shadow: 0 25px 40px -8px #000, 0 0 0 1px #8b5cf640 inset, 0 0 30px #06b6d440; }
      100% { box-shadow: 0 35px 55px -5px #020617, 0 0 0 1.5px #2dd4bf60 inset, 0 0 50px #a855f760; }
    }

    /* Header ảnh Gravity */
    .gravity-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 1.2rem;
    }
    .gravity-logo img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 30px;
      background: #0b0720;
      padding: 8px;
      border: 2px solid #7e22ce;
      box-shadow: 0 0 30px #a855f7, 0 6px 0 #2e1065;
      transition: transform 0.2s;
      animation: levitate 4s infinite alternate;
    }
    @keyframes levitate {
      from { transform: translateY(0px); }
      to { transform: translateY(-6px); }
    }

    /* Tiêu đề */
    .title-section {
      text-align: center;
      margin-bottom: 24px;
    }
    .title-section h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c084fc, #67e8f9, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
      text-shadow: 0 0 15px #7c3aed;
      filter: drop-shadow(0 4px 4px #00000030);
    }
    .title-section .sub {
      color: #b9a6ff;
      font-weight: 400;
      border-bottom: 1px dashed #6b21a8;
      padding-bottom: 6px;
      display: inline-block;
    }

    /* Input group */
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .input-group input {
      flex: 1;
      background: #0f0b1e;
      border: 2px solid #4c1d95;
      border-radius: 60px;
      padding: 16px 22px;
      font-size: 1rem;
      font-weight: 500;
      color: #e9d5ff;
      font-family: 'Space Grotesk', monospace;
      outline: none;
      transition: all 0.2s;
      box-shadow: 0 0 10px #2e1065, inset 0 2px 5px #00000060;
    }
    .input-group input:focus {
      border-color: #22d3ee;
      box-shadow: 0 0 25px #06b6d4, inset 0 0 5px #c084fc;
    }
    .input-group input::placeholder {
      color: #9b87c9;
      font-weight: 300;
    }

    /* BUTTON chung */
    .btn {
      background: linear-gradient(145deg, #1e103f, #140a26);
      border: 1.5px solid #7e22ce;
      color: #f3e8ff;
      padding: 12px 22px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 10px 0 #2e1065, 0 4px 12px #00000070;
      transition: all 0.1s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      backdrop-filter: blur(8px);
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 13px 0 #3b0764, 0 8px 18px #a855f7;
      border-color: #67e8f9;
      background: #28184e;
      color: white;
    }
    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 5px 0 #2e1065, 0 4px 10px black;
    }
    .btn-icon {
      background: #321f60;
      padding: 10px 18px;
    }

    /* Login btn riêng */
    .login-btn {
      width: 100%;
      padding: 16px 10px;
      font-size: 1.3rem;
      background: linear-gradient(145deg, #4c1d95, #2e1065);
      border: 2px solid #a78bfa;
      box-shadow: 0 12px 0 #1e0746, 0 0 25px #a855f7;
    }

    /* Panel chính (ẩn hiện animation slide down) */
    #mainPanel {
      margin-top: 22px;
      overflow: hidden;
      transition: max-height 0.7s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s;
      max-height: 0;
      opacity: 0;
    }
    #mainPanel.show {
      max-height: 800px;   /* đủ cao */
      opacity: 1;
      animation: slideDown 0.6s forwards;
    }
    @keyframes slideDown {
      0% { transform: translateY(-25px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* Grid nút bấm */
    .key-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 20px 0 18px;
    }
    .key-grid .btn {
      padding: 14px 5px;
    }

    .custom-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    #h {
      background: #0f0b1e;
      border: 2px solid #7e22ce;
      border-radius: 40px;
      padding: 14px 20px;
      color: white;
      flex: 2;
    }
    .custom-row .btn {
      flex: 1;
    }

    /* pre output */
    .output-area {
      background: #05020c;
      border: 1.5px solid #06b6d4;
      border-radius: 28px;
      padding: 16px 18px;
      margin: 20px 0 12px;
      max-height: 160px;
      overflow: auto;
      font-family: 'Space Grotesk', monospace;
      font-size: 0.9rem;
      color: #b9f2ff;
      box-shadow: inset 0 0 30px #000000, 0 6px 0 #1c0e38;
      backdrop-filter: blur(5px);
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Footer ảnh + dev */
    .footer-credits {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 25px;
      padding-top: 15px;
      border-top: 1px dashed #6d28d9;
    }
    .owner-section, .dev-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 40px;
      border: 2px solid #a855f7;
      object-fit: cover;
      background: #1e103c;
      box-shadow: 0 0 12px #c084fc;
    }
    .credit-text {
      font-weight: 600;
      color: #d8b4fe;
      text-shadow: 0 2px 5px black;
    }
    .credit-text small {
      display: block;
      font-size: 0.7rem;
      color: #a78bfa;
      font-weight: 400;
    }
    .fa-grav {
      margin-right: 4px;
    }

    /* responsive */
    @media (max-width: 480px) {
      .gravity-panel { padding: 1.5rem; }
      .key-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- BACKGROUND ANIMATION >>>><<< -->
  <div class="gravity-bg">
    <div class="gravity-wave"></div>
    <div class="gravity-wave"></div>
  </div>
  <div class="scrolling-arrows">
    >>>•<<< &nbsp;&nbsp; >>>•<<< &nbsp;&nbsp; >>>•<<< &nbsp;&nbsp; >>>•<<< &nbsp;&nbsp; >>>•<<< &nbsp;&nbsp; >>>•<<< &nbsp;&nbsp; >>>•<<< &nbsp;&nbsp; >>>•<<<
  </div>

  <!-- PANEL CHÍNH -->
  <div class="gravity-panel">
    <!-- Ảnh gravity (https://ibb.co/YGfctyB) -->
    <div class="gravity-logo">
      <img src="https://i.ibb.co/YGfctyB/gravity-logo.png" alt="GRAVITY LOGO" crossorigin="anonymous" 
           onerror="this.src='https://i.ibb.co/YGfctyB/gravity-logo.png';">
    </div>
    <div class="title-section">
      <h1><i class="fas fa-atom" style="color:#c084fc;"></i> GRAVITY</h1>
      <div class="sub">✦ owner key access ✦</div>
    </div>

    <!-- LOGIN AREA -->
    <div class="input-group">
      <input type="password" id="k" placeholder="Nhập OWNER KEY" autocomplete="off" spellcheck="false">
      <button class="btn login-btn" onclick="login()"><i class="fas fa-key"></i> MỞ KHÓA</button>
    </div>

    <!-- PANEL ẨN (slide down) -->
    <div id="mainPanel">
      <!-- Lưới nút tạo key -->
      <div class="key-grid">
        <button class="btn" onclick="c('24h')"><i class="far fa-clock"></i> 24H</button>
        <button class="btn" onclick="c('3d')"><i class="far fa-calendar"></i> 3D</button>
        <button class="btn" onclick="c('1m')"><i class="fas fa-calendar-alt"></i> 1 THÁNG</button>
        <button class="btn" onclick="c('lifetime')"><i class="fas fa-infinity"></i> VĨNH VIỄN</button>
      </div>
      
      <div class="custom-row">
        <input id="h" type="number" placeholder="Giờ (số)" min="1" value="2">
        <button class="btn" onclick="custom()"><i class="fas fa-plus-circle"></i> TÙY CHỈNH</button>
      </div>

      <div style="display: flex; gap: 10px; margin-bottom: 5px;">
        <button class="btn btn-icon" onclick="loadStats()"><i class="fas fa-chart-pie"></i> THỐNG KÊ</button>
        <button class="btn btn-icon" onclick="loadLogs()"><i class="fas fa-scroll"></i> NHẬT KÝ</button>
      </div>

      <!-- OUTPUT PRE -->
      <pre id="out" class="output-area">✨ Sẵn sàng nhận key...</pre>
    </div>

    <!-- FOOTER: OWNER + DEV GRAVITY (kèm ảnh) -->
    <div class="footer-credits">
      <div class="owner-section">
        <img class="avatar" src="https://i.ibb.co/YTB7sNDx/tboy-roblox.png" alt="tboy roblox" crossorigin="anonymous" 
             onerror="this.src='https://i.ibb.co/YTB7sNDx/tboy-roblox.png';">
        <div class="credit-text">
          TBOY ROBLOX <small>OWNER</small>
        </div>
      </div>
      <div class="dev-section">
        <img class="avatar" src="https://i.ibb.co/XrrVZxJJ/dev-gravity.png" alt="dev gravity" crossorigin="anonymous"
             onerror="this.src='https://i.ibb.co/XrrVZxJJ/dev-gravity.png';">
        <div class="credit-text">
          DEV GRAVITY <small>ARCHITECT</small>
        </div>
      </div>
    </div>
    <!-- Dòng chữ nhỏ thể hiện dev -->
    <div style="text-align: center; margin-top: 12px; opacity: 0.8; font-size: 0.75rem; letter-spacing: 1px;">
      <i class="fas fa-bolt" style="color: #a78bfa;"></i> gravity panel · phiên bản vô cực · © tboy roblox 
    </div>
  </div>

  <script>
    (function() {
      // biến toàn cục
      let KEY = "";
      const mainPanel = document.getElementById('mainPanel');
      const outEl = document.getElementById('out');

      // Hàm login — hiển thị panel trượt xuống nếu key không rỗng
      window.login = function() {
        const keyInput = document.getElementById('k');
        const rawKey = keyInput.value.trim();
        if (rawKey === "") {
          outEl.innerText = "nhap key";
          return;
        }
        KEY = rawKey;
        // thêm class show để animation slide down
        mainPanel.classList.add('show');
        outEl.innerText = "Đã mở khóa Gravity Panel. Chọn loại key...";
        // Thêm hiệu ứng nhẹ
      };

      // Hàm gọi API /create
      window.c = async function(type) {
        if (!KEY) { outEl.innerText = "❌ Chưa có owner key."; return; }
        outEl.innerText = "Đang tạo key " + type + " ...";
        try {
          let r = await fetch("/create", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-owner-key": KEY },
            body: JSON.stringify({ type: type })
          });
          const text = await r.text();
          outEl.innerText = text || "[ Phản hồi trống ]";
        } catch (e) {
          outEl.innerText = "Lỗi kết nối: " + e.message;
        }
      };

      window.custom = async function() {
        if (!KEY) { outEl.innerText = "Chưa có owner key."; return; }
        const hoursInput = document.getElementById('h');
        let hours = parseFloat(hoursInput.value);
        if (isNaN(hours) || hours <= 0) {
          outEl.innerText = "Số giờ không hợp lệ.";
          return;
        }
        outEl.innerText = `Tạo key tùy chỉnh ${hours} giờ...`;
        try {
          let r = await fetch("/create", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-owner-key": KEY },
            body: JSON.stringify({ type: "custom", hours: hours })
          });
          const text = await r.text();
          outEl.innerText = text;
        } catch (e) {
          outEl.innerText = "Lỗi: " + e.message;
        }
      };

      window.loadStats = async function() {
        if (!KEY) { outEl.innerText = "Chưa có owner key."; return; }
        outEl.innerText = "Đang tải thống kê...";
        try {
          let r = await fetch("/stats", { headers: { "x-owner-key": KEY } });
          const json = await r.json();
          outEl.innerText = JSON.stringify(json, null, 2);
        } catch (e) {
          outEl.innerText = "Lỗi tải stats: " + e.message;
        }
      };

      window.loadLogs = async function() {
        if (!KEY) { outEl.innerText = "Chưa có owner key."; return; }
        outEl.innerText = "Đang tải nhật ký...";
        try {
          let r = await fetch("/logs", { headers: { "x-owner-key": KEY } });
          const json = await r.json();
          outEl.innerText = JSON.stringify(json, null, 2);
        } catch (e) {
          outEl.innerText = "Lỗi tải logs: " + e.message;
        }
      };

      // Xử lý ảnh dự phòng (nếu link ibb lỗi thì giữ nguyên)
      // Thêm chút animation chữ >>>><<< bổ sung
      // Khi nhấn Enter ở ô input cũng login
      const keyField = document.getElementById('k');
      keyField.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
          e.preventDefault();
          window.login();
        }
      });


      // document.getElementById('k').value = "demo-gravity";
    })();
  </script>
  <!-- Đảm bảo ảnh gravity hiển thị (dùng link ibb) -->
  <!-- Gravity panel hoàn chỉnh với UI tím xanh, hiệu ứng >>>•<<< di chuyển -->
</body>
</html>
